<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha - Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 Jogo da Velha</h1>
        
        <div class="game-info">
            <p id="status">Vez do jogador: X</p>
            <p id="score">X: 0 | O: 0</p>
        </div>

        <div class="game-board" id="gameBoard">
            <!-- O tabuleiro será gerado pelo JavaScript -->
        </div>

        <div class="controls">
            <button id="resetBtn">🔄 Novo Jogo</button>
            <button id="clearScoreBtn">🗑️ Limpar Placar</button>
        </div>

        <div class="instructions">
            <h3>Como jogar:</h3>
            <p>Clique em qualquer célula para marcar sua jogada!</p>
            <p>O primeiro a fazer 3 em linha vence!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
